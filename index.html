<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorThief</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f8f6;
  --white: #ffffff;
  --ink: #0f0f0e;
  --border: #e2e2de;
  --muted: #9a9a94;
  --dim: #d0d0cc;
  --mono: 'DM Mono', monospace;
  --display: 'Clash Display', 'DM Mono', sans-serif;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--mono);
}

/* HEADER */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--ink);
}

.header-meta {
  font-size: 11px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.06em;
}

/* MAIN LAYOUT */
.main {
  display: grid;
  grid-template-columns: 1fr 400px;
  min-height: calc(100vh - 56px);
}

/* LEFT: UPLOAD + IMAGE */
.left-panel {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.panel-header {
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.ph-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}

.ph-action {
  font-size: 11px;
  font-weight: 400;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--mono);
  transition: color 0.15s;
  padding: 0;
}
.ph-action:hover { color: var(--ink); }

/* DROP ZONE */
.drop-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  cursor: pointer;
  transition: background 0.2s;
  position: relative;
  min-height: 400px;
}

.drop-zone.dragover { background: rgba(15,15,14,0.03); }
.drop-zone.has-image { padding: 0; cursor: default; }

.drop-icon {
  width: 64px;
  height: 64px;
  border: 1.5px solid var(--border);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  font-size: 24px;
  transition: all 0.2s;
}
.drop-zone:not(.has-image):hover .drop-icon {
  border-color: var(--ink);
  transform: translateY(-2px);
}

.drop-title {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 8px;
  letter-spacing: -0.2px;
}

.drop-sub {
  font-size: 12px;
  font-weight: 300;
  color: var(--muted);
  text-align: center;
  line-height: 1.6;
  margin-bottom: 28px;
}

.drop-btn {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.08em;
  padding: 11px 24px;
  border: 1.5px solid var(--ink);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.18s;
  border-radius: 0;
}
.drop-btn:hover { background: var(--ink); color: var(--bg); }

input[type="file"] { display: none; }

/* IMAGE PREVIEW */
.image-preview {
  width: 100%;
  height: 100%;
  min-height: 400px;
  object-fit: cover;
  display: block;
}

/* IMAGE STRIP */
.image-strip {
  height: 6px;
  display: flex;
  flex-shrink: 0;
}

.strip-seg {
  flex: 1;
  transition: flex 0.4s ease;
}
.strip-seg:hover { flex: 3; }

/* RIGHT: PALETTE */
.right-panel {
  display: flex;
  flex-direction: column;
  background: var(--white);
}

/* EMPTY STATE */
.palette-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
  text-align: center;
  gap: 12px;
  color: var(--dim);
}

.pe-grid {
  display: grid;
  grid-template-columns: repeat(3, 32px);
  grid-template-rows: repeat(2, 32px);
  gap: 6px;
  margin-bottom: 8px;
}

.pe-cell {
  border-radius: 6px;
  background: var(--border);
}

.pe-text {
  font-size: 12px;
  font-weight: 300;
  color: var(--dim);
  letter-spacing: 0.04em;
}

/* PALETTE LIST */
.palette-list {
  flex: 1;
  display: none;
  flex-direction: column;
}
.palette-list.visible { display: flex; }

.palette-item {
  display: flex;
  align-items: center;
  gap: 0;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
  position: relative;
  overflow: hidden;
}
.palette-item:hover { background: var(--bg); }
.palette-item:last-child { border-bottom: none; }

.pi-swatch {
  width: 72px;
  height: 72px;
  flex-shrink: 0;
  transition: width 0.25s ease;
}
.palette-item:hover .pi-swatch { width: 88px; }

.pi-info {
  flex: 1;
  padding: 16px 20px;
  min-width: 0;
}

.pi-hex {
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.04em;
  margin-bottom: 4px;
  font-family: var(--mono);
}

.pi-name {
  font-size: 11px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.04em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pi-rgb {
  font-size: 10px;
  font-weight: 300;
  color: var(--dim);
  letter-spacing: 0.03em;
  margin-top: 3px;
}
.pi-copy {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--dim);
  font-size: 14px;
  margin-right: 12px;
  border-radius: 8px;
  transition: all 0.15s;
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 11px;
}
.pi-copy:hover { background: var(--bg); color: var(--ink); }
.pi-copy.copied { color: #2a9d5c; }

/* PALETTE FOOTER */
.palette-footer {
  border-top: 1px solid var(--border);
  padding: 16px 24px;
  display: none;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.palette-footer.visible { display: flex; }

.pf-info {
  font-size: 11px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.04em;
}

.pf-btns { display: flex; gap: 8px; }

.pf-btn {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  padding: 8px 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
}
.pf-btn:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }

.pf-btn-primary {
  background: var(--ink);
  color: var(--white);
  border-color: var(--ink);
}
.pf-btn-primary:hover { opacity: 0.8; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--ink);
  color: var(--white);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.06em;
  padding: 10px 22px;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* PROCESSING */
.processing {
  position: absolute;
  inset: 0;
  background: rgba(248,248,246,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  z-index: 5;
}
.processing.visible { display: flex; }

.proc-text {
  font-size: 12px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.proc-bar {
  width: 120px;
  height: 2px;
  background: var(--border);
  overflow: hidden;
}

.proc-fill {
  height: 100%;
  background: var(--ink);
  width: 0%;
  animation: proc 1.2s ease-in-out infinite;
}

@keyframes proc {
  0% { width: 0%; margin-left: 0; }
  50% { width: 60%; }
  100% { width: 0%; margin-left: 100%; }
}

/* MOBILE */
@media (max-width: 768px) {
  .main { grid-template-columns: 1fr; }
  .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
  header { padding: 0 20px; }
  .drop-zone { min-height: 260px; padding: 40px 24px; }
  .right-panel { min-height: 400px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    ColorThief
  </div>
  <div class="header-meta">extract · name · copy</div>
</header>

<div class="main">

  <!-- LEFT -->
  <div class="left-panel">
    <div class="panel-header">
      <div class="ph-label">Image input</div>
      <button class="ph-action" id="changeBtn" style="display:none" onclick="resetImage()">× clear image</button>
    </div>

    <div class="drop-zone" id="dropZone">
      <div class="processing" id="processing">
        <div class="proc-text">Extracting colors</div>
        <div class="proc-bar"><div class="proc-fill"></div></div>
      </div>

      <div id="dropContent">
        <div class="drop-icon">🎨</div>
        <div class="drop-title">Drop your image here</div>
        <div class="drop-sub">Any photo, screenshot, artwork, or moodboard.<br>Works best with colorful images.</div>
        <button class="drop-btn" onclick="document.getElementById('fileInput').click()">Choose file</button>
      </div>

      <img class="image-preview" id="imagePreview" style="display:none" />
    </div>

    <div class="image-strip" id="imageStrip"></div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="panel-header">
      <div class="ph-label">Extracted palette</div>
      <div class="ph-label" id="colorCount" style="color:var(--ink)"></div>
    </div>

    <div class="palette-empty" id="paletteEmpty">
      <div class="pe-grid">
        <div class="pe-cell"></div><div class="pe-cell"></div><div class="pe-cell"></div>
        <div class="pe-cell"></div><div class="pe-cell"></div><div class="pe-cell"></div>
      </div>
      <div class="pe-text">upload an image to extract its palette</div>
    </div>

    <div class="palette-list" id="paletteList"></div>

    <div class="palette-footer" id="paletteFooter">
      <div class="pf-info" id="pfInfo">—</div>
      <div class="pf-btns">
        <button class="pf-btn" onclick="copyAllHex()">copy all hex</button>
        <button class="pf-btn pf-btn-primary" onclick="copyCSS()">copy as CSS</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" />
<div class="toast" id="toast"></div>

<script>
// ── COLOR NAMING ──
// Named by proximity to a curated list of ~80 color anchors
const COLOR_NAMES = [
  { name: "Midnight Black", r:10, g:10, b:10 },
  { name: "Charcoal", r:54, g:54, b:54 },
  { name: "Graphite", r:88, g:88, b:88 },
  { name: "Slate Gray", r:120, g:120, b:130 },
  { name: "Silver", r:180, g:180, b:180 },
  { name: "Platinum", r:220, g:220, b:220 },
  { name: "Ghost White", r:245, g:245, b:250 },
  { name: "Pure White", r:255, g:255, b:255 },
  { name: "Ivory", r:255, g:250, b:240 },
  { name: "Cream", r:255, g:245, b:220 },
  { name: "Linen", r:240, g:228, b:210 },
  { name: "Warm Sand", r:210, g:190, b:160 },
  { name: "Tan", r:185, g:155, b:115 },
  { name: "Camel", r:190, g:150, b:90 },
  { name: "Khaki", r:195, g:180, b:120 },
  { name: "Olive", r:130, g:130, b:50 },
  { name: "Moss Green", r:100, g:130, b:70 },
  { name: "Forest Green", r:40, g:100, b:50 },
  { name: "Emerald", r:0, g:160, b:80 },
  { name: "Mint", r:145, g:220, b:175 },
  { name: "Sage", r:155, g:185, b:150 },
  { name: "Seafoam", r:130, g:210, b:190 },
  { name: "Teal", r:0, g:145, b:140 },
  { name: "Dark Teal", r:0, g:100, b:100 },
  { name: "Cyan", r:0, g:210, b:230 },
  { name: "Sky Blue", r:110, g:185, b:240 },
  { name: "Cornflower", r:100, g:140, b:220 },
  { name: "Cobalt", r:30, g:80, b:200 },
  { name: "Royal Blue", r:50, g:60, b:190 },
  { name: "Navy", r:20, g:30, b:110 },
  { name: "Midnight Blue", r:15, g:20, b:80 },
  { name: "Indigo", r:70, g:50, b:180 },
  { name: "Violet", r:130, g:60, b:200 },
  { name: "Purple", r:160, g:50, b:190 },
  { name: "Plum", r:130, g:40, b:120 },
  { name: "Mauve", r:190, g:130, b:180 },
  { name: "Lavender", r:200, g:180, b:240 },
  { name: "Lilac", r:210, g:180, b:225 },
  { name: "Orchid", r:210, g:115, b:210 },
  { name: "Hot Pink", r:255, g:80, b:160 },
  { name: "Rose", r:240, g:100, b:130 },
  { name: "Blush", r:250, g:180, b:190 },
  { name: "Dusty Rose", r:210, g:150, b:155 },
  { name: "Salmon", r:245, g:140, b:115 },
  { name: "Coral", r:255, g:110, b:80 },
  { name: "Tomato", r:230, g:60, b:50 },
  { name: "Crimson", r:190, g:20, b:40 },
  { name: "Burgundy", r:130, g:20, b:40 },
  { name: "Maroon", r:110, g:20, b:30 },
  { name: "Rust", r:190, g:80, b:30 },
  { name: "Burnt Orange", r:210, g:100, b:30 },
  { name: "Orange", r:255, g:140, b:0 },
  { name: "Amber", r:255, g:180, b:0 },
  { name: "Gold", r:230, g:180, b:20 },
  { name: "Yellow", r:255, g:230, b:0 },
  { name: "Lemon", r:255, g:245, b:100 },
  { name: "Chartreuse", r:180, g:230, b:50 },
  { name: "Lime", r:130, g:220, b:30 },
  { name: "Warm Brown", r:140, g:90, b:50 },
  { name: "Chocolate", r:100, g:55, b:25 },
  { name: "Espresso", r:65, g:35, b:20 },
  { name: "Sienna", r:165, g:85, b:50 },
  { name: "Terracotta", r:200, g:105, b:75 },
  { name: "Clay", r:190, g:130, b:100 },
  { name: "Peach", r:255, g:200, b:160 },
  { name: "Apricot", r:250, g:175, b:130 },
  { name: "Dusty Blue", r:120, g:155, b:185 },
  { name: "Steel Blue", r:80, g:120, b:165 },
  { name: "Powder Blue", r:180, g:210, b:235 },
  { name: "Ice Blue", r:210, g:235, b:250 },
  { name: "Warm Gray", r:160, g:155, b:148 },
  { name: "Cool Gray", r:148, g:150, b:160 },
  { name: "Taupe", r:165, g:148, b:130 },
  { name: "Mushroom", r:190, g:175, b:160 },
];

function colorDist(r1,g1,b1,r2,g2,b2) {
  return Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
}

function nameColor(r,g,b) {
  let best = COLOR_NAMES[0], bestDist = Infinity;
  for (const c of COLOR_NAMES) {
    const d = colorDist(r,g,b,c.r,c.g,c.b);
    if (d < bestDist) { bestDist = d; best = c; }
  }
  return best.name;
}

function toHex(r,g,b) {
  return "#" + [r,g,b].map(v => v.toString(16).padStart(2,"0")).join("").toUpperCase();
}

// ── MEDIAN CUT COLOR EXTRACTION ──
function extractColors(imageData, count = 8) {
  const pixels = [];
  const data = imageData.data;
  const step = Math.max(1, Math.floor(data.length / 4 / 4000));
  for (let i = 0; i < data.length; i += 4 * step) {
    const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
    if (a > 128) pixels.push([r, g, b]);
  }

  function quantize(pixels, depth) {
    if (depth === 0 || pixels.length < 10) {
      const r = Math.round(pixels.reduce((s,p)=>s+p[0],0)/pixels.length);
      const g = Math.round(pixels.reduce((s,p)=>s+p[1],0)/pixels.length);
      const b = Math.round(pixels.reduce((s,p)=>s+p[2],0)/pixels.length);
      return [[r,g,b]];
    }
    const rRange = Math.max(...pixels.map(p=>p[0])) - Math.min(...pixels.map(p=>p[0]));
    const gRange = Math.max(...pixels.map(p=>p[1])) - Math.min(...pixels.map(p=>p[1]));
    const bRange = Math.max(...pixels.map(p=>p[2])) - Math.min(...pixels.map(p=>p[2]));
    const channel = rRange >= gRange && rRange >= bRange ? 0 : gRange >= bRange ? 1 : 2;
    pixels.sort((a,b) => a[channel] - b[channel]);
    const mid = Math.floor(pixels.length / 2);
    return [
      ...quantize(pixels.slice(0, mid), depth - 1),
      ...quantize(pixels.slice(mid), depth - 1)
    ];
  }

  const depth = Math.ceil(Math.log2(count));
  let colors = quantize(pixels, depth);

  // Deduplicate similar colors
  const unique = [];
  for (const c of colors) {
    const tooClose = unique.some(u => colorDist(c[0],c[1],c[2],u[0],u[1],u[2]) < 28);
    if (!tooClose) unique.push(c);
  }

  return unique.slice(0, count);
}

// ── STATE ──
let extractedColors = [];

// ── DROP ZONE ──
const dropZone = document.getElementById("dropZone");

dropZone.addEventListener("dragover", e => {
  e.preventDefault();
  dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));

dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith("image/")) processFile(file);
});

document.getElementById("fileInput").addEventListener("change", e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
});

function processFile(file) {
  const reader = new FileReader();
  reader.onload = e => loadImage(e.target.result);
  reader.readAsDataURL(file);
}

function loadImage(src) {
  document.getElementById("processing").classList.add("visible");

  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement("canvas");
    const MAX = 300;
    const scale = Math.min(1, MAX / Math.max(img.width, img.height));
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    setTimeout(() => {
      const colors = extractColors(imageData, 8);
      extractedColors = colors;
      renderPalette(colors);
      showImage(src, colors);
      document.getElementById("processing").classList.remove("visible");
    }, 300);
  };
  img.src = src;
}

function showImage(src, colors) {
  const preview = document.getElementById("imagePreview");
  const dropContent = document.getElementById("dropContent");
  preview.src = src;
  preview.style.display = "block";
  dropContent.style.display = "none";
  dropZone.classList.add("has-image");
  document.getElementById("changeBtn").style.display = "block";

  // Color strip
  const strip = document.getElementById("imageStrip");
  strip.innerHTML = colors.map(c =>
    `<div class="strip-seg" style="background:${toHex(c[0],c[1],c[2])}"></div>`
  ).join("");
}

function renderPalette(colors) {
  const list = document.getElementById("paletteList");
  const footer = document.getElementById("paletteFooter");
  const empty = document.getElementById("paletteEmpty");
  const countEl = document.getElementById("colorCount");

  empty.style.display = "none";
  list.classList.add("visible");
  footer.classList.add("visible");

  countEl.textContent = `${colors.length} colors`;
  document.getElementById("pfInfo").textContent = `${colors.length} colors extracted`;

  list.innerHTML = colors.map((c, i) => {
    const hex = toHex(c[0], c[1], c[2]);
    const name = nameColor(c[0], c[1], c[2]);
    const rgb = `rgb(${c[0]}, ${c[1]}, ${c[2]})`;
    const light = (c[0]*0.299 + c[1]*0.587 + c[2]*0.114) > 180;
    return `
      <div class="palette-item" style="animation: fadeIn 0.3s ease ${i*0.06}s both">
        <div class="pi-swatch" style="background:${hex}"></div>
        <div class="pi-info">
          <div class="pi-hex">${hex}</div>
          <div class="pi-name">${name}</div>
          <div class="pi-rgb">${rgb}</div>
        </div>
        <button class="pi-copy" onclick="copyHex('${hex}', this)" title="Copy hex">copy</button>
      </div>
    `;
  }).join("");
}

function copyHex(hex, btn) {
  navigator.clipboard.writeText(hex).then(() => {
    const orig = btn.textContent;
    btn.textContent = "✓";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = orig; btn.classList.remove("copied"); }, 1800);
  });
}

function copyAllHex() {
  const hexes = extractedColors.map(c => toHex(c[0],c[1],c[2])).join(", ");
  navigator.clipboard.writeText(hexes).then(() => showToast("All hex codes copied"));
}
