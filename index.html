<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorThief</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f8f6;
  --white: #ffffff;
  --ink: #0f0f0e;
  --border: #e2e2de;
  --muted: #9a9a94;
  --dim: #d0d0cc;
  --mono: 'DM Mono', monospace;
  --display: 'Clash Display', 'DM Mono', sans-serif;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--mono);
}

/* HEADER */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--ink);
}

.header-meta {
  font-size: 11px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.06em;
}

/* MAIN LAYOUT */
.main {
  display: grid;
  grid-template-columns: 1fr 400px;
  min-height: calc(100vh - 56px);
}

/* LEFT: UPLOAD + IMAGE */
.left-panel {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.panel-header {
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.ph-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}
