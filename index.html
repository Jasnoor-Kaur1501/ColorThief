<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ColorThief</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f8f6;
  --white: #ffffff;
  --ink: #0f0f0e;
  --border: #e2e2de;
  --muted: #9a9a94;
  --dim: #d0d0cc;
  --mono: 'DM Mono', monospace;
  --display: 'Clash Display', 'DM Mono', sans-serif;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--mono);
}

/* HEADER */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--ink);
}

.header-meta {
  font-size: 11px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.06em;
}

/* MAIN LAYOUT */
.main {
  display: grid;
  grid-template-columns: 1fr 400px;
  min-height: calc(100vh - 56px);
}

/* LEFT: UPLOAD + IMAGE */
.left-panel {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.panel-header {
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.ph-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}

.ph-action {
  font-size: 11px;
  font-weight: 400;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--mono);
  transition: color 0.15s;
  padding: 0;
}
.ph-action:hover { color: var(--ink); }

/* DROP ZONE */
.drop-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  cursor: pointer;
  transition: background 0.2s;
  position: relative;
  min-height: 400px;
}

.drop-zone.dragover { background: rgba(15,15,14,0.03); }
.drop-zone.has-image { padding: 0; cursor: default; }

.drop-icon {
  width: 64px;
  height: 64px;
  border: 1.5px solid var(--border);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  font-size: 24px;
  transition: all 0.2s;
}
.drop-zone:not(.has-image):hover .drop-icon {
  border-color: var(--ink);
  transform: translateY(-2px);
}

.drop-title {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 8px;
  letter-spacing: -0.2px;
}

.drop-sub {
  font-size: 12px;
  font-weight: 300;
  color: var(--muted);
  text-align: center;
  line-height: 1.6;
  margin-bottom: 28px;
}

.drop-btn {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.08em;
  padding: 11px 24px;
  border: 1.5px solid var(--ink);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.18s;
  border-radius: 0;
}
.drop-btn:hover { background: var(--ink); color: var(--bg); }

input[type="file"] { display: none; }

/* IMAGE PREVIEW */
.image-preview {
  width: 100%;
  height: 100%;
  min-height: 400px;
  object-fit: cover;
  display: block;
}

/* IMAGE STRIP */
.image-strip {
  height: 6px;
  display: flex;
  flex-shrink: 0;
}

.strip-seg {
  flex: 1;
  transition: flex 0.4s ease;
}
.strip-seg:hover { flex: 3; }

/* RIGHT: PALETTE */
.right-panel {
  display: flex;
  flex-direction: column;
  background: var(--white);
}
